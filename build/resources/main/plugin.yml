main: me.astralisvox.astravisus.AstraVisus
name: AstraVisus
version: '1.0.0'
api-version: '1.21'
description: Minecraft Spigot/Paper 1.21.x NightVision Plugin
author: AstralisVox
prefix: AstraVisus

commands:
  astravisus:
    description: Main plugin command
    aliases: [av,avisus, astrav]
    usage: /astravisus

  nightvision:
    description: Main command to control nightvision
    aliases:
      - nv
      - nvision
      - nightv
    usage: /nightvision on|off|list
    permission: astravisus.nightvision.toggle
    permission-message: "&cYou do not have permission to use this command."

permissions:
  astravisus.admin:
    description: The wildcard permission to grant all plugin permissions
    default: op
    children:
      astravisus.reload: true
      astravisus.nightvision.admin: true
      astravisus.updates: true

  astravisus.nightvision.admin:
    description: The wildcard permission for give all nightvision permissions
    default: op
    children:
      astravisus.nightvision.toggle: true
      astravisus.nightvision.toggle.others: true
      astravisus.nightvision.global: true
      astravisus.nightvision.list: true
      astravisus.nightvision.login: true
      astravisus.nightvision.keepondeath: true
      astravisus.nightvision.cost.bypass: true
      astravisus.nightvision.world.bypass: true
      astravisus.nightvision.temp: true

  astravisus.reload:
    description: The permission to use the reload command for the plugin
    default: op

  astravisus.updates:
    description: The permission used to receive plugin update notifications.
    default: op

  astravisus.nightvision.toggle:
    description: The main permission to allow users to toggle nightvision on and off.
    default: op

  astravisus.nightvision.toggle.others:
    description: The permission used to toggle nightvision for other players.
    default: op

  astravisus.nightvision.global:
    description: The permission used to toggle nightvision for all online players.
    default: op

  astravisus.nightvision.list:
    description: The permission used to see who has nightvision enabled.
    default: op

  astravisus.nightvision.login:
    description: The permission used to keep nightvision active when you login/logout.
    default: op

  astravisus.nightvision.keepondeath:
    description: The permission used to keep nightvision active after you die.
    default: op

  astravisus.nightvision.cost.bypass:
    description: The permission used to bypass the cost for using nightvision (if enabled).
    default: op

  astravisus.nightvision.world.bypass:
    description: Permission used to bypass the world change feature
    default: op

  astravisus.nightvision.temp:
    description: The permission used to set temporary night vision
    default: op